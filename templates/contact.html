{% extends 'base.html' %}
{% block main %}
<section class="page-header">
    <h1>{{ t.contact.page_title }}</h1>
</section>

                <span>{{ t.contact.our_location }}</span>
                <p>{{ t.contact.address_line1 }}<br>{{ t.contact.address_line2 }}</p>
            </div>
            <div class="contact-page__item phone">
                <svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M48 1H16V63H48V1Z" stroke="#E07100" stroke-width="2" stroke-miterlimit="10"></path>
                    <path d="M28 5H36" stroke="#E07100" stroke-width="2" stroke-miterlimit="10"></path>
                    <path d="M16 51H48" stroke="#E07100" stroke-width="2" stroke-miterlimit="10"></path>
                    <path d="M16 9H48" stroke="#E07100" stroke-width="2" stroke-miterlimit="10"></path>
                    <path d="M32 59C33.1046 59 34 58.1046 34 57C34 55.8954 33.1046 55 32 55C30.8954 55 30 55.8954 30 57C30 58.1046 30.8954 59 32 59Z" stroke="#E07100" stroke-width="2" stroke-miterlimit="10" stroke-linejoin="bevel"></path>
                </svg>
                <span>{{ t.contact.call_us }}</span>
                <a href="tel:+48 579 057 915">+48 579 057 915</a>
            </div>
            <div class="contact-page__item">
                <svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><defs><style>.cls-1,.cls-2{fill:none;stroke:var(--primarycolor);stroke-linejoin:round;stroke-width:1px;}.cls-2{stroke-linecap:round;}</style></defs><rect class="cls-1" height="42.33" rx="4.61" ry="4.61" width="62" x="1" y="10.67"></rect><polyline class="cls-2" points="5 16 32 32 59 16"></polyline><line class="cls-2" x1="24.91" x2="5" y1="27.8" y2="44"></line><line class="cls-2" x1="39.09" x2="59" y1="27.8" y2="45"></line></g></svg>
                <span>{{ t.contact.write_us }}</span>
                <a href="mailto:contact@o7.am">contact@o7.am</a>
            </div>
        </div>
        <div class="contact-page__support">
            <p class="contact-page__support-line">{{ t.contact.support_line }}</p>
            <a href="https://ko-fi.com/o7am_" target="_blank" rel="noopener noreferrer" class="contact-page__support-cta" aria-label="{{ t.contact.support_cta }}">
                <svg class="contact-page__support-cta-icon" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 8h1a4 4 0 0 1 0 8h-1"/><path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg>
            </a>
        </div>
    </div>
</section>
<div class="footer__map">
    <iframe aria-label="Dojazdowa,1" loading="lazy" src="https://maps.google.com/maps?q=Dojazdowa,radzyny%20polska&amp;t=m&amp;z=15&amp;output=embed&amp;iwloc=near" title="Dojazdowa, radzyny"></iframe>
</div>
{% endblock %}
