<!-- Google tag (gtag.js) - config deferred until after first paint -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-KJ5Y48KL7B"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  function runGtagConfig(){gtag('config', 'G-KJ5Y48KL7B');}
  if (typeof requestIdleCallback === 'function') {
    requestIdleCallback(function(){runGtagConfig();},{timeout:3000});
  } else {
    setTimeout(runGtagConfig, 2500);
  }
</script>
<meta charset="utf-8" />
<meta content="IE=edge" http-equiv="X-UA-Compatible" />
<title>{{ title }}</title>
<meta name="description" content="{{ description }}" />
<meta property="og:title" content="{{ title }}" />
<meta property="og:description" content="{{ description }}" />
<meta property="og:url" content="{{ canonical_url }}" />
<meta property="og:site_name" content="o7AM">
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="{{ title }}" />
<meta name="twitter:description" content="{{ description }}" />
<meta content="#008776" name="theme-color" />
<meta content="dark" name="theme" />
<script>
(function(){var t=localStorage.getItem("o7am-theme");document.documentElement.setAttribute("data-theme",t==="light"?"light":"dark");})();
</script>
<link rel="icon" type="image/svg+xml" href="{{ root }}assets/favicon.svg" />
{% if preload_lcp | default(false) %}
<link rel="preload" as="image" href="{{ root }}assets/o7am/logo_wide.jpg" />
{% endif %}
<link rel="stylesheet" href="{{ root }}style.css" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="{{ root }}style.css" /></noscript>
<link rel="preconnect" href="https://code.cdn.mozilla.net" />
<link rel="stylesheet" href="https://code.cdn.mozilla.net/fonts/fira.css" media="print" onload="this.media='all'" />
<noscript><link rel="stylesheet" href="https://code.cdn.mozilla.net/fonts/fira.css" /></noscript>
<meta property="og:image" content="https://o7.am/assets/o7am/logo_wide.jpg" />
