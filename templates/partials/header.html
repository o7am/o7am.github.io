<header class="header">
    <div class="header__container">
        <a href="{{ base }}index.html" class="header__logo">o<span class="header__logo-accent">7</span>AM</a>
        <div class="header__menu ">
            <ul class="header__menu-list">
                <li class="header__menu-item has-children">
                    <a href="{{ base }}services.html">{{ t.nav.services }}</a>
                    <svg class="chevronmenu" width="8" height="6" viewBox="0 0 8 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6L0.535899 -6.52533e-07L7.4641 -4.68497e-08L4 6Z" fill="white"></path>
                    </svg>
                    <svg class="chevrondisplay" width="8" height="6" viewBox="0 0 8 6" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M4 6L0.535899 -6.52533e-07L7.4641 -4.68497e-08L4 6Z" fill="white"></path>
                    </svg>
                    <ul class="header__submenu">
                        <li class="header__menu-item">
                            <a href="{{ base }}services/it.html">{{ t.nav.services_it }}</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="{{ base }}services/3d.html">{{ t.nav.services_3d }}</a>
                        </li>
                        <li class="header__menu-item">
                            <a href="{{ base }}services/de.html">{{ t.nav.services_de }}</a>
                        </li>
                    </ul>
                </li>
                <li class="header__menu-item">
                    <a href="{{ base }}portfolio.html">{{ t.nav.portfolio }}</a>
                </li>
                <li class="header__menu-item">
                    <a href="{{ base }}blog.html">{{ t.nav.blog }}</a>
                </li>
            </ul>
            <nav class="header__lang-switch" aria-label="{{ t.nav.aria_lang }}">
                <a href="{{ base }}{{ other_lang_href }}" class="header__lang" aria-label="{{ t.nav.other_lang_label }}" title="{{ t.nav.other_lang_label }}">{{ t.nav.other_lang_flag }}</a>
                <span class="header__lang header__lang--current" aria-current="true" aria-label="{{ t.nav.current_lang_label }}">{{ t.nav.current_lang_flag }}</span>
            </nav>
            <a class="header__button" href="{{ base }}contact.html">{{ t.nav.contact }}</a></div>
        <div class="header__ham"><div class="header__ham-menubtn"></div></div>
    </div>
</header>
