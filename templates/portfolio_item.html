{% extends 'base.html' %}
{% block main %}
<div style="position: relative; pointer-events: auto;" class="">
    <section class="page-header">
        <h1>{{ item.title[locale] }}</h1>
    </section>
    <div class="wider-photo padding">
        <img loading="lazy" src="{{ root }}{{ item.image }}" alt="{{ item.title[locale] }}">
    </div>
    {% if item.body and item.body[locale] %}
    <div class="smaller-text">
        <div class="smaller-text__container">
            {{ item.body[locale] | safe }}
        </div>
    </div>
    {% endif %}
    {% if item.gallery %}
    <section class="portfolio-gallery">
        <div class="portfolio-gallery__container">
            <div class="portfolio-gallery__items">
                {% for img in item.gallery %}
                <div class="portfolio-gallery__item">
                    <span>Kliknij, aby powiększyć</span>
                    <img loading="lazy" src="{{ root }}{{ img }}" class="gallery-image" alt="Zdjęcie">
                    <svg viewBox="0 0 512 512" version="1.1" xmlns="http://www.w3.org/2000/svg" fill="#000000"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"><title>zoom-selection</title><g id="Page-1" stroke="none" stroke-width="1" fill="none" fill-rule="evenodd"><g id="zoom-out" fill="#ffffff" transform="translate(64.000000, 64.000000)"><path d="M202.666667,106.666667 C267.468077,106.666667 320,159.198589 320,224 C320,248.693232 312.372008,271.60485 299.343845,290.507034 L380.561809,371.725253 L350.391919,401.895142 L269.173594,320.677252 C250.271431,333.70537 227.359852,341.333333 202.666667,341.333333 C137.865256,341.333333 85.3333333,288.801411 85.3333333,224 C85.3333333,159.198589 137.865256,106.666667 202.666667,106.666667 Z M202.666667,149.333333 C161.429405,149.333333 128,182.762739 128,224 C128,265.237261 161.429405,298.666667 202.666667,298.666667 C243.903928,298.666667 277.333333,265.237261 277.333333,224 C277.333333,182.762739 243.903928,149.333333 202.666667,149.333333 Z" id="Combined-Shape"></path></g></g></g></svg>
                </div>
                {% endfor %}
            </div>
        </div>
    </section>
    <div id="image-popup" style="display:none;">
        <span id="close-popup">×</span>
        <img loading="lazy" id="popup-img" src="">
        <a id="prev" class="control">❮</a>
        <a id="next" class="control">❯</a>
    </div>
    {% endif %}
</div>
{% endblock %}
