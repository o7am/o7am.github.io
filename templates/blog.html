{% extends 'base.html' %}
{% block main %}
<section class="page-header">
    <h1>{{ t.blog.page_title }}</h1>
    <p>{{ t.blog.subtitle }}</p>
</section>
<section class="blog-archive">
    <div class="blog-archive__container">
        <div class="blog-archive__items">
            {% for b in blogs %}
            <a class="blog-archive__item" href="{{ base }}blogs/{{ b.slug }}.html">
                <div class="blog-archive__item-image">
                    <img alt="{{ b.title[locale] }}" src="{{ base }}{{ b.image }}" loading="lazy">
                </div>
                <div class="blog-archive__item-text">
                    <p class="title">{{ b.title[locale] }}</p>
                    <span class="read-more">{{ t.blog.read_more }}</span>
                </div>
                <span class="date"><span class="date__number">{{ b.date }}</span></span>
            </a>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
