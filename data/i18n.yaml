  services:
    heading: "Nasze usługi dla Twojego biznesu"
    it_title: "Wsparcie IT | o7AM"
    it_short: "Wsparcie IT"
    it_teaser: "Pomoc techniczna, konfiguracja, utrzymanie systemów"
    it_cta: "Pomoc techniczna, konfiguracja stanowisk i sieci, utrzymanie systemów. Wsparcie zdalne i na miejscu, elastyczne formy współpracy."
    it_heading: "Ogólne wsparcie IT dla firm"
    it_body: "Oferujemy wsparcie informatyczne dla małych i średnich firm: konfiguracja stanowisk i sieci, utrzymanie systemów, pomoc zdalna i na miejscu, wdrożenia oraz doradztwo. Elastyczne formy współpracy dopasowane do Twoich potrzeb."
    3d_title: "Druk 3D na zamówienie | o7AM"
    3d_short: "Druk 3D na zamówienie"
    3d_teaser: "Indywidualne projekty, wysoka jakość, szybki czas realizacji"
    3d_cta: "Oferujemy profesjonalne drukowanie elementów 3D na zamówienie, dostosowane do indywidualnych potrzeb klienta. Wysoka jakość i terminowość."
    3d_heading: "Dlaczego warto skorzystać z druku 3D na zamówienie"
    3d_body: "Oferujemy usługi druku 3D, które pozwalają na realizację indywidualnych projektów dostosowanych do potrzeb naszych klientów. Dzięki nowoczesnej technologii możemy tworzyć skomplikowane modele, prototypy, części zamienne oraz unikalne produkty. Wysoka jakość materiałów, wsparcie ekspertów na każdym etapie i elastyczne podejście do projektowania. Z nami możesz zrealizować nawet najbardziej ambitne projekty."
    de_title: "Data Engineering | o7AM"
    de_short: "Data Engineering"
    de_teaser: "ELT/ETL, Spark, Trino, Flink"
    de_cta: "Specjalizujemy się w kompleksowym przetwarzaniu danych oraz inżynierii danych, oferując rozwiązania dopasowane do specyficznych potrzeb biznesowych."
    de_heading: "Usługi z zakresu Data Engineeringu"
    de_body: "Specjalizujemy się w dostarczaniu rozwiązań z zakresu Data Engineeringu: projektowanie i budowa potoków danych (Spark, Flink, Airflow), ETL/ELT, Big Data, usługi chmurowe (AWS, GCP, Kubernetes, Terraform). Rozwiązania dopasowane do kontekstu biznesowego i technologicznego. Skontaktuj się z nami, aby dowiedzieć się, jak możemy wspierać rozwój Twojego biznesu."
