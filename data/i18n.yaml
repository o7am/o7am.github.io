    index_intro_1: 'W o7AM stawiamy na kreatywne podejście i nieszablonowe rozwiązania, które zmieniają sposób myślenia o technologii 3D. Dzięki szybkiemu prototypowaniu, ekologicznym metodom oraz podejściu "fast fail, fast learn" pomagamy naszym klientom realizować projekty, które są zarówno innowacyjne, jak i efektywne.'
