    pl: |
      <h2>Opis projektu</h2>
      <p>Zamówiony, spersonalizowany uchwyt na papierowe filtry do dripa Hario V60-2. Projekt wykonany w druku 3D, dopasowany do rozmiaru filtrów, z możliwością naniesienia logo lub napisu. Idealny jako gadżet reklamowy dla kawiarni, palarni kawy lub marek kawowych – łączy funkcjonalność z promocją marki.</p>
    en: |
      <h2>Project description</h2>
      <p>Custom-ordered holder for paper filters for the Hario V60-2 drip brewer. The project was 3D-printed, tailored to the filter size, with the option to add a logo or text. Ideal as a promotional item for cafés, coffee roasters or coffee brands—combining functionality with brand promotion.</p>

